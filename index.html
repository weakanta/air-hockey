<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey Debug Mode</title>
    <style>
        body { background: #1a1a1a; text-align: center; color: white; font-family: sans-serif; margin: 0; }
        #debug-log { background: #000; color: #0f0; font-family: monospace; font-size: 12px; text-align: left; padding: 10px; height: 100px; overflow-y: scroll; border-bottom: 2px solid #444; }
        canvas { border: 4px solid #444; background: #00111a; display: block; margin: 10px auto; }
        #lobby { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        input { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #0077ff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="debug-log">システムログ: 起動中...</div>

    <div id="lobby">
        <h2>AIR HOCKEY</h2>
        <input type="text" id="nameInput" placeholder="名前" value="Player">
        <input type="text" id="roomInput" placeholder="部屋番号" value="123">
        <button id="joinBtn">ゲーム開始</button>
        <p style="font-size: 12px; color: #888;">※ここを押しても反応がない場合は設定ミスです</p>
    </div>

    <div id="status"></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const log = (msg) => {
            const el = document.getElementById("debug-log");
            el.innerHTML += `<br>> ${msg}`;
            el.scrollTop = el.scrollHeight;
        };

        // あなたの設定
        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.com",
            projectId: "airhockey-1e251",
            // ★もし動かなければ、Firebase画面にある正しいURLをここに貼ってください
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app", 
            storageBucket: "airhockey-1e251.firebasestorage.app",
            messagingSenderId: "15014810791",
            appId: "1:15014810791:web:7dc84e7143d495cf97b782"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            log("Firebase初期化成功");

            document.getElementById("joinBtn").onclick = () => {
                const room = document.getElementById("roomInput").value;
                const name = document.getElementById("nameInput").value;
                log(`部屋 ${room} に接続を試みます...`);
                
                const gameRef = ref(db, `games/room_${room}`);
                
                // 接続テスト
                set(ref(db, 'test_connection'), Date.now())
                    .then(() => {
                        log("送信成功！通信できています。");
                        document.getElementById("lobby").style.display = "none";
                        setupGame(db, room, name);
                    })
                    .catch((err) => {
                        log("【エラー】送信失敗: " + err.message);
                        if (err.message.includes("permission_denied")) {
                            log("→ ルールの設定が反映されていないようです");
                        }
                    });
            };
        } catch (e) {
            log("重大なエラー: " + e.message);
        }

        function setupGame(db, room, name) {
            // ここにゲームの同期処理（前回の内容）が入ります
            log("ゲーム開始準備完了。");
            // ... (省略して動作確認を優先します)
        }
    </script>
</body>
</html>
