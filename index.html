<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey Real</title>
    <style>
        body { background: #1a1a1a; text-align: center; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        canvas { border: 4px solid #444; background: radial-gradient(circle, #002b4d 0%, #00111a 100%); display: block; margin: 10px auto; box-shadow: 0 0 30px rgba(0,0,0,0.7); cursor: none; }
        .info { font-size: 28px; margin-top: 10px; font-weight: bold; letter-spacing: 2px; }
        .msg { font-size: 16px; color: #00ffcc; margin-top: 5px; height: 20px; }
    </style>
</head>
<body>
    <div class="info">PLAYER <span id="p-score" style="color:#0077ff">0</span> - <span id="c-score" style="color:#ff3300">0</span> CPU</div>
    <div id="status" class="msg">マウスを動かしてスタート！ (7点先取)</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const pScoreDisp = document.getElementById("p-score");
        const cScoreDisp = document.getElementById("c-score");
        const statusDisp = document.getElementById("status");

        let playerScore = 0;
        let cpuScore = 0;
        let gameRunning = false;
        let gameOver = false;

        const paddleRadius = 30;
        const puckRadius = 15;
        const friction = 0.992; // 摩擦を弱くしてスムーズに（1.0に近づけるほど滑る）
        const wallBounce = 0.8; // 壁で少し減速

        let player = { x: 200, y: 500, vx: 0, vy: 0, lastX: 200, lastY: 500 };
        let cpu = { x: 200, y: 50, vx: 0 };
        let puck = { x: 200, y: 300, vx: 0, vy: 0 };

        // マウスが画面内に入ったら自動開始
        canvas.addEventListener("mouseenter", () => {
            if (!gameRunning && !gameOver) {
                gameRunning = true;
                statusDisp.innerText = "";
                resetPuck(true);
            }
        });

        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 速度計算
            player.vx = mouseX - player.lastX;
            player.vy = mouseY - player.lastY;
            
            player.x = mouseX;
            player.y = Math.max(canvas.height / 2 + paddleRadius, Math.min(canvas.height - paddleRadius, mouseY));

            player.lastX = player.x;
            player.lastY = player.y;
        });

        // 終了後のリトライ用
        window.addEventListener("mousedown", () => {
            if (gameOver) location.reload();
        });

        function update() {
            if (gameRunning && !gameOver) {
                // 物理移動
                puck.vx *= friction;
                puck.vy *= friction;
                puck.x += puck.vx;
                puck.y += puck.vy;

                // 壁の反射
                if (puck.x < puckRadius) {
                    puck.x = puckRadius;
                    puck.vx *= -wallBounce;
                } else if (puck.x > canvas.width - puckRadius) {
                    puck.x = canvas.width - puckRadius;
                    puck.vx *= -wallBounce;
                }

                // ゴール判定
                if (puck.y < -puckRadius) {
                    playerScore++;
                    if(!checkWin()) resetPuck(false);
                } else if (puck.y > canvas.height + puckRadius) {
                    cpuScore++;
                    if(!checkWin()) resetPuck(true);
                }

                pScoreDisp.innerText = playerScore;
                cScoreDisp.innerText = cpuScore;

                // CPUの動き（より滑らかに）
                let targetX = puck.x;
                cpu.x += (targetX - cpu.x) * 0.12;

                handleCollision(player);
                handleCollision(cpu);
            }
            draw();
            requestAnimationFrame(update);
        }

        function handleCollision(p) {
            let dx = puck.x - p.x;
            let dy = puck.y - p.y;
            let distance = Math.hypot(dx, dy);

            if (distance < paddleRadius + puckRadius) {
                let angle = Math.atan2(dy, dx);
                
                // パドルの速度を反映（リアルなインパクト）
                let impactX = puck.vx - (p.vx || 0);
                let impactY = puck.vy - (p.vy || 0);
                let impactSpeed = Math.hypot(impactX, impactY);

                let speed = Math.max(7, impactSpeed * 0.8); 
                if (speed > 16) speed = 16; // 最高速度制限

                puck.vx = Math.cos(angle) * speed;
                puck.vy = Math.sin(angle) * speed;

                // めり込み防止
                let overlap = (paddleRadius + puckRadius) - distance;
                puck.x += Math.cos(angle) * overlap;
                puck.y += Math.sin(angle) * overlap;
            }
        }

        function resetPuck(toPlayer) {
            puck.x = 200;
            puck.y = 300;
            puck.vx = 0;
            puck.vy = toPlayer ? 4 : -4;
        }

        function checkWin() {
            if (playerScore >= 7 || cpuScore >= 7) {
                statusDisp.innerText = (playerScore >= 7 ? "YOU WIN!" : "CPU WIN...") + "  クリックで再挑戦";
                gameOver = true;
                return true;
            }
            return false;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // センターサークルとライン
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 70, 0, Math.PI*2);
            ctx.moveTo(0, canvas.height/2);
            ctx.lineTo(canvas.width, canvas.height/2);
            ctx.stroke();

            // ゴールエリア
            ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
            ctx.fillRect(125, 0, 150, 20);
            ctx.fillRect(125, canvas.height-20, 150, 20);

            // パドルとパック（光る効果付き）
            drawCircle(cpu.x, cpu.y, paddleRadius, "#ff3300", true); 
            drawCircle(player.x, player.y, paddleRadius, "#0077ff", true); 
            drawCircle(puck.x, puck.y, puckRadius, "#ffffff", false); 
        }

        function drawCircle(x, y, r, color, glow) {
            ctx.save();
            if(glow) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
            }
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            // パドルの質感を出すための内側の円
            ctx.strokeStyle = "rgba(0,0,0,0.3)";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        }

        update();
    </script>
</body>
</html>
