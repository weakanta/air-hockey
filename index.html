<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey Pro</title>
    <style>
        body { background: #222; text-align: center; color: white; font-family: 'Arial', sans-serif; overflow: hidden; }
        canvas { border: 5px solid #555; background: #001a33; display: block; margin: 10px auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: none; }
        .info { font-size: 24px; margin-bottom: 10px; }
        .msg { font-size: 18px; color: #aaa; }
    </style>
</head>
<body>
    <div class="info">PLAYER <span id="p-score">0</span> - <span id="c-score">0</span> CPU</div>
    <div id="status" class="msg">クリックしてスタート (7点先取)</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const pScoreDisp = document.getElementById("p-score");
        const cScoreDisp = document.getElementById("c-score");
        const statusDisp = document.getElementById("status");

        // ゲーム状態
        let playerScore = 0;
        let cpuScore = 0;
        let gameRunning = false;
        let gameOver = false;

        // 設定
        const paddleRadius = 30;
        const puckRadius = 15;
        const friction = 0.985; // 摩擦（少しずつ減速させる）

        let player = { x: 200, y: 550, lastX: 200, lastY: 550, vx: 0, vy: 0 };
        let cpu = { x: 200, y: 50, vx: 0 };
        let puck = { x: 200, y: 300, vx: 0, vy: 0 };

        // マウス移動（パドルの速度計算含む）
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 前のフレームとの差分からパドルの速度(vx, vy)を計算
            player.vx = mouseX - player.x;
            player.vy = mouseY - player.y;

            player.x = mouseX;
            // 自陣制限
            player.y = Math.max(canvas.height / 2 + paddleRadius, Math.min(canvas.height - paddleRadius, mouseY));
        });

        // クリックで開始
        canvas.addEventListener("mousedown", () => {
            if (gameOver) {
                location.reload(); // 試合終了後はリロード
            } else if (!gameRunning) {
                gameRunning = true;
                statusDisp.innerText = "試合中！";
                resetPuck(true);
            }
        });

        function resetPuck(toPlayer) {
            puck.x = canvas.width / 2;
            puck.y = canvas.height / 2;
            // 最初は止めておく（移動開始時のみ速度を与える）
            puck.vx = 0;
            puck.vy = toPlayer ? 2 : -2; 
        }

        function update() {
            if (!gameRunning || gameOver) return;

            // パックに摩擦を適用（速すぎ防止）
            puck.vx *= friction;
