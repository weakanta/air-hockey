<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Air Hockey - Fix</title>
    <style>
        body { background: #1a1a1a; text-align: center; color: white; font-family: sans-serif; }
        #lobby { background: #2a2a2a; padding: 20px; border-radius: 10px; width: 300px; margin: 50px auto; border: 2px solid #0077ff; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        /* ボタンを大きく、分かりやすくしました */
        #joinBtn { width: 90%; padding: 15px; background: #0077ff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        #joinBtn:active { background: #0055cc; }
        canvas { border: 2px solid #444; background: #000; display: none; margin: 10px auto; }
        #msg { color: #00ffcc; margin: 10px; }
    </style>
</head>
<body>

    <div id="lobby">
        <h2>AIR HOCKEY</h2>
        <input type="text" id="nameInput" placeholder="名前を入力" value="Player">
        <input type="text" id="roomInput" placeholder="部屋番号" value="123">
        <button type="button" id="joinBtn">ゲーム開始！</button>
    </div>

    <div id="msg"></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script type="module">
        // Firebaseの読み込み
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.com",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.firebaseio.com",
            storageBucket: "airhockey-1e251.firebasestorage.app",
            messagingSenderId: "15014810791",
            appId: "1:15014810791:web:7dc84e7143d495cf97b782"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ボタンの動作を定義
        const joinBtn = document.getElementById("joinBtn");
        joinBtn.addEventListener("click", () => {
            const name = document.getElementById("nameInput").value;
            const room = document.getElementById("roomInput").value;
            
            if(!room) {
                alert("部屋番号を入力してください");
                return;
            }

            console.log("Button clicked!"); // ブラウザのF12で見れるログ
            document.getElementById("msg").innerText = "接続中...";
            document.getElementById("lobby").style.display = "none";
            document.getElementById("gameCanvas").style.display = "block";
            
            // 通信開始
            startHearts(room, name);
        });

        function startHearts(room, name) {
            const gameId = "room_" + room;
            const gameRef = ref(db, `games/${gameId}`);
            
            // 接続テスト（画像 で成功していた処理）
            set(ref(db, `games/${gameId}/last_access`), Date.now());
            
            // ここにゲームの同期プログラムが入ります
            // (まずはロビーが消えてキャンバスが出るかを確認しましょう)
        }
    </script>
</body>
</html>
